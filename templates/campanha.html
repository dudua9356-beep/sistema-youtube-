<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ name }}</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#000;
    color:#fff;
}

.overlay{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.box{
    width:100%;
    max-width:500px;
    background:#111;
    border-radius:15px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,.5);
}

h1{
    margin-top:0;
}

iframe{
    width:100%;
    height:280px;
    border:none;
    border-radius:10px;
    margin:20px 0;
}

#resultado{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
    color:#ffd700;
}
</style>
</head>
<body>

<div class="overlay">
    <div class="box">
        <h1>{{ name }}</h1>

        <p>
            Assista ao vídeo, deixe o like e se inscreva no canal.
        </p>

        <iframe
            src="{{ youtube_url | replace('watch?v=', 'embed/') }}"
            allowfullscreen>
        </iframe>

        <div id="resultado">
            ⏳ Aguarde 20 segundos...
        </div>
    </div>
</div>

<script>
setTimeout(function() {
    document.getElementById("resultado").innerHTML =
        "🎉 Sorteio liberado!";

    window.location.href = "{{ giveaway_url }}";
}, 20000);
</script>

</body>
</html>
