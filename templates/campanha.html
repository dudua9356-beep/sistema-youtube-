<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ name }}</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
}

.container {
    max-width: 500px;
    margin: 40px auto;
    background: #111;
    padding: 25px;
    border-radius: 12px;
    text-align: center;
}

iframe {
    width: 100%;
    height: 280px;
    border: none;
    border-radius: 8px;
    margin: 20px 0;
}

#status {
    font-size: 18px;
    font-weight: bold;
    color: #ffd700;
}
</style>
</head>
<body>

<div class="container">
    <h1>{{ name }}</h1>

    <p>
        Assista à live, deixe o like e permaneça inscrito no canal.
    </p>

    <iframe
        src="{{ youtube_url | replace('watch?v=', 'embed/') }}"
        allowfullscreen>
    </iframe>

    <div id="status">
        ⏳ Verificando...
    </div>
</div>

<script>
setTimeout(function () {
    document.getElementById("status").innerHTML =
        "🎉 Sorteio liberado!";
    window.location.href = "{{ giveaway_url }}";
}, 20000);
</script>

</body>
</html>
