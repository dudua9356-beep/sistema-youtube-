<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ name }}</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#000;
    color:#fff;
    font-family:Arial, sans-serif;
}

.container{
    max-width:600px;
    margin:0 auto;
    background:#111;
    border-radius:15px;
    padding:25px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,.5);
}

h1{
    margin-top:0;
}

a.botao{
    display:block;
    width:100%;
    padding:15px;
    margin:15px 0;
    background:#ff0000;
    color:#fff;
    text-decoration:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
}

#status{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
    color:#ffd700;
}

.oculto{
    display:none;
}
</style>
</head>
<body>

<div class="container">
    <h1>{{ name }}</h1>

    <p>
        1️⃣ Clique no botão abaixo para abrir a live.<br>
        2️⃣ Deixe o like e se inscreva no canal.<br>
        3️⃣ Volte para esta página.<br>
        4️⃣ Clique em "Já fiz tudo".
    </p>

    <!-- BOTÃO QUE ABRE A LIVE -->
    <a
        href="{{ youtube_url }}"
        target="_blank"
        class="botao"
    >
        🔴 Abrir Live no YouTube
    </a>

    <!-- BOTÃO DE VERIFICAÇÃO -->
    <button
        id="btnVerificar"
        onclick="verificar()"
        style="
            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#ffd700;
            color:#000;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
        "
    >
        ✅ Já fiz tudo
    </button>

    <!-- STATUS -->
    <div id="status" class="oculto">
        ⏳ Verificando...
    </div>
</div>

<script>
function verificar() {
    document.getElementById("btnVerificar").style.display = "none";
    document.getElementById("status").classList.remove("oculto");

    let segundos = 5;
    const status = document.getElementById("status");

    const intervalo = setInterval(function() {
        segundos--;

        if (segundos > 0) {
            status.innerHTML = "⏳ Verificando... " + segundos + "s";
        } else {
            clearInterval(intervalo);
            status.innerHTML = "🎉 Sorteio liberado!";
            window.location.href = "{{ giveaway_url }}";
        }
    }, 1000);
}
</script>

</body>
</html>
