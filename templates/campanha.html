<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ name }}</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#000;
    color:#fff;
    font-family:Arial, sans-serif;
}

.container{
    max-width:600px;
    margin:0 auto;
    background:#111;
    border-radius:15px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,.5);
}

h1{
    margin-top:0;
}

.botao{
    display:block;
    width:100%;
    padding:15px;
    margin:20px 0;
    background:#ff0000;
    color:#fff;
    text-decoration:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
}

#status{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
    color:#ffd700;
    display:none;
}

.progress{
    width:100%;
    height:10px;
    background:#333;
    border-radius:10px;
    overflow:hidden;
    margin-top:15px;
    display:none;
}

.bar{
    width:0%;
    height:100%;
    background:#00ff66;
    transition:width 1s linear;
}
</style>
</head>
<body>

<div class="container">
    <h1>{{ name }}</h1>

    <p>
        Clique no botão abaixo para abrir a live no YouTube.
        <br><br>
        Deixe o like e se inscreva no canal.
        <br><br>
        Quando voltar para esta página, o sistema irá verificar
        automaticamente e liberar o sorteio.
    </p>

    <!-- BOTÃO PARA ABRIR A LIVE -->
    <a
        href="{{ youtube_url }}"
        target="_blank"
        class="botao"
        id="btnLive"
    >
        🔴 Abrir Live no YouTube
    </a>

    <!-- STATUS -->
    <div id="status">
        ⏳ Verificando...
    </div>

    <!-- BARRA DE PROGRESSO -->
    <div class="progress" id="progress">
        <div class="bar" id="bar"></div>
    </div>
</div>

<script>
// Salva no navegador que a pessoa clicou no botão
document.getElementById("btnLive").addEventListener("click", function() {
    localStorage.setItem("abriu_live", "sim");
});

// Quando a pessoa volta para a página, inicia a verificação automática
window.addEventListener("focus", function() {
    if (localStorage.getItem("abriu_live") === "sim") {
        iniciarVerificacao();
        localStorage.removeItem("abriu_live");
    }
});

let verificando = false;

function iniciarVerificacao() {
    if (verificando) return;
    verificando = true;

    document.getElementById("btnLive").style.display = "none";
    document.getElementById("status").style.display = "block";
    document.getElementById("progress").style.display = "block";

    let segundos = 5;
    const status = document.getElementById("status");
    const bar = document.getElementById("bar");

    const intervalo = setInterval(function() {
        segundos--;

        const progresso = ((5 - segundos) / 5) * 100;
        bar.style.width = progresso + "%";

        if (segundos > 0) {
            status.innerHTML = "⏳ Verificando... " + segundos + "s";
        } else {
            clearInterval(intervalo);
            status.innerHTML = "🎉 Sorteio liberado!";
            window.location.href = "{{ giveaway_url }}";
        }
    }, 1000);
}
</script>

</body>
</html>
