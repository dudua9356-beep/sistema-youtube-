<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login Painel</title>

<style>
body{
    background:#000;
    color:#fff;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#111;
    padding:40px;
    border-radius:20px;
    width:350px;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#00cc66;
    color:#fff;
    font-size:18px;
}

.erro{
    color:red;
    margin-bottom:15px;
}
</style>
</head>
<body>

<div class="box">

<h1>Painel Streamer</h1>

{% if erro %}
<div class="erro">
{{ erro }}
</div>
{% endif %}

<form method="POST">

<input
type="text"
name="usuario"
placeholder="Usuário"
required
>

<input
type="password"
name="senha"
placeholder="Senha"
required
>

<button type="submit">
Entrar
</button>

</form>

</div>

</body>
</html>
