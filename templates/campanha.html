<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ name }}</title>

<style>
body {
    margin: 0;
    padding: 20px;
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    text-align: center;
}

h1 {
    margin-bottom: 20px;
}

#videoFrame,
#giveawayFrame {
    width: 100%;
    max-width: 900px;
    height: 500px;
    border: none;
    border-radius: 10px;
}

#timer {
    font-size: 24px;
    font-weight: bold;
    color: #00ff88;
    margin: 20px 0;
}

#status {
    margin-top: 15px;
    color: #ccc;
}

#giveawayContainer {
    display: none;
}
</style>
</head>
<body>

<h1>{{ name }}</h1>

<!-- Etapa 1: Vídeo -->
<div id="videoContainer">
    <iframe
        id="videoFrame"
        src="{{ youtube_url }}"
        allowfullscreen>
    </iframe>

    <div id="timer">Aguarde 30 segundos...</div>
    <p id="status">
        Assista ao vídeo, deixe o like e se inscreva no canal.
    </p>
</div>

<!-- Etapa 2: Sorteio -->
<div id="giveawayContainer">
    <h2>🎉 Sorteio liberado!</h2>
    <iframe
        id="giveawayFrame"
        src="{{ giveaway_url }}">
    </iframe>
</div>

<script>
let segundos = 30;
const timer = document.getElementById("timer");

const intervalo = setInterval(() => {
    segundos--;
    timer.textContent = `Aguarde ${segundos} segundos...`;

    if (segundos <= 0) {
        clearInterval(intervalo);

        // Esconde o vídeo
        document.getElementById("videoContainer").style.display = "none";

        // Mostra o sorteio
        document.getElementById("giveawayContainer").style.display = "block";
    }
}, 1000);
</script>

</body>
</html>
