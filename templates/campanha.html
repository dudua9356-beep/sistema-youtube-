<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>{{ name }}</title>

<style>

body{
    background:#000;
    color:#fff;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{
    background:#111;
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:350px;
}

a{
    display:block;
    background:#ff0000;
    color:#fff;
    padding:15px;
    border-radius:10px;
    text-decoration:none;
    margin-top:20px;
    font-size:18px;
}

#status{
    margin-top:20px;
    font-size:20px;
}

.barra{
    width:100%;
    height:20px;
    background:#333;
    border-radius:20px;
    overflow:hidden;
    margin-top:20px;
    display:none;
}

.progresso{
    height:100%;
    width:0%;
    background:#00cc66;
    transition:1s;
}

</style>

</head>
<body>

<div class="box">

<h1>{{ name }}</h1>

<p>
Entre na live, deixe o like
e se inscreva.
</p>

<a
href="{{ youtube_url }}"
target="_blank"
id="youtubeBtn"
>
IR PARA LIVE
</a>

<div id="status"></div>

<div class="barra" id="barra">
    <div
    class="progresso"
    id="progresso"
    ></div>
</div>

</div>

<script>

const youtubeBtn =
document.getElementById("youtubeBtn")

const statusDiv =
document.getElementById("status")

const barra =
document.getElementById("barra")

const progresso =
document.getElementById("progresso")

youtubeBtn.addEventListener(
"click",
() => {

    statusDiv.innerHTML =
    "Verificando interação..."

    barra.style.display = "block"

    let tempo = 30

    let progressoAtual = 0

    const intervalo =
    setInterval(() => {

        tempo--

        progressoAtual += 3.33

        progresso.style.width =
        progressoAtual + "%"

        statusDiv.innerHTML =
        "Verificando... "
        + tempo + "s"

        if (tempo <= 0) {

            clearInterval(intervalo)

            fetch(
            "/campanha/{{ slug }}/verificado"
            )
            .then(() => {

                statusDiv.innerHTML =
                "Acesso liberado!"

                setTimeout(() => {

                    window.location.href =
                    "/campanha/{{ slug }}/liberar"

                }, 2000)

            })

        }

    }, 1000)

})

</script>

</body>
</html>
