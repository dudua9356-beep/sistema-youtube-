<!-- templates/campanha.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ name }}</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#000;
    color:#fff;
    font-family:Arial, sans-serif;
}

.container{
    max-width:600px;
    margin:0 auto;
    background:#111;
    border-radius:15px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,.5);
}

h1{
    margin-top:0;
}

.botao{
    display:block;
    width:100%;
    padding:15px;
    margin:20px 0;
    background:#ff0000;
    color:#fff;
    text-decoration:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
}

#status{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
    color:#ffd700;
    display:none;
}

.progress{
    width:100%;
    height:10px;
    background:#333;
    border-radius:10px;
    overflow:hidden;
    margin-top:15px;
    display:none;
}

.bar{
    width:0%;
    height:100%;
    background:#00ff66;
    transition:width 1s linear;
}
</style>
</head>
<body>

<div class="container">
    <h1>{{ name }}</h1>

    <p>
        Clique no botão abaixo para abrir a live no YouTube.
        <br><br>
        Deixe o like e se inscreva no canal.
        <br><br>
        Quando você voltar para esta página, o sistema irá
        verificar automaticamente e liberar o sorteio.
    </p>

    <!-- BOTÃO PARA ABRIR A LIVE -->
    <a
        href="{{ youtube_url }}"
        target="_blank"
        class="botao"
        id="btnLive"
    >
        🔴 Abrir Live no YouTube
    </a>

    <!-- STATUS -->
    <div id="status">
        ⏳ Verificando...
    </div>

    <!-- BARRA DE PROGRESSO -->
    <div class="progress" id="progress">
        <div class="bar" id="bar"></div>
    </div>
</div>

<script>
let verificando = false;

// Chave única por campanha usando o nome
const chave = "abriu_live_{{ name | replace(' ', '_') }}";

// Quando clicar no botão, marca que a live foi aberta
document.getElementById("btnLive").addEventListener("click", function() {
    localStorage.setItem(chave, "1");
});

// Quando o usuário voltar para a aba
function verificarRetorno() {
    if (localStorage.getItem(chave) === "1") {
        localStorage.removeItem(chave);
        iniciarVerificacao();
    }
}

document.addEventListener("visibilitychange", function() {
    if (document.visibilityState === "visible") {
        verificarRetorno();
    }
});

window.addEventListener("focus", verificarRetorno);

function iniciarVerificacao() {
    if (verificando) return;
    verificando = true;

    document.getElementById("btnLive").style.display = "none";
    document.getElementById("status").style.display = "block";
    document.getElementById("progress").style.display = "block";

    let segundos = 30; // TEMPO DE VERIFICAÇÃO
    const status = document.getElementById("status");
    const bar = document.getElementById("bar");

    const intervalo = setInterval(function() {
        segundos--;

        const progresso = ((30 - segundos) / 30) * 100;
        bar.style.width = progresso + "%";

        if (segundos > 0) {
            status.innerHTML = "⏳ Verificando... " + segundos + "s";
        } else {
            clearInterval(intervalo);
            status.innerHTML = "🎉 Sorteio liberado!";

            // Usa a rota protegida do servidor.
            // O link real do sorteio não aparece no HTML.
            window.location.href = "/campanha/{{ request.view_args.slug }}/liberar";
        }
    }, 1000);
}
</script>

</body>
</html>
