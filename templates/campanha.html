<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ name }}</title>
<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1600') center/cover no-repeat fixed;
    color:white;
}
.overlay{
    min-height:100vh;
    background:rgba(0,0,0,.75);
    display:flex;
    justify-content:center;
    align-items:center;
}
.box{
    max-width:500px;
    width:90%;
    background:rgba(0,0,0,.75);
    padding:30px;
    border-radius:15px;
    text-align:center;
}
iframe{
    width:100%;
    height:250px;
    border:none;
    border-radius:10px;
    margin:20px 0;
}
button{
    background:#ffcc00;
    border:none;
    padding:15px 25px;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}
#resultado{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>
<body>
<div class="overlay">
    <div class="box">
        <h1>{{ name }}</h1>
        <p>
            Assista ao vídeo, deixe o like e se inscreva no canal.
        </p>

        <!-- VÍDEO -->
        <iframe
            src="{{ youtube_url | replace('watch?v=', 'embed/') }}"
            allowfullscreen>
        </iframe>

        <!-- SEM BOTÃO DE LIBERAÇÃO -->
        <p id="resultado">
            ⏳ Aguarde 20 segundos com o vídeo aberto...
        </p>
    </div>
</div>

<script>
/*
  IMPORTANTE:
  O YouTube não fornece uma API pública para confirmar se o usuário
  clicou em "Like". Por isso, este template remove o botão
  "Já fiz tudo" e libera automaticamente após 20 segundos.
*/

setTimeout(function() {
    document.getElementById("resultado").innerHTML =
        "🎉 Sorteio liberado!";
    window.open("{{ giveaway_url }}", "_blank");
}, 20000);
</script>
</body>
</html>
