<html lang="pt-BR">
<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"

<title>Sistema</title>

<style>

body{

    font-family:Arial,sans-serif;
    background:#0f0f0f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#1c1c1c;
    padding:40px;

    display:block;
    margin-top:20px;
    color:white;
    padding:14px;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

.user{
    background:#ff0000;
}

.streamer{
    background:#333;
}

</style>

</head>
<body>

<div class="box">

<h1>Sistema de Sorteio</h1>

<a
class="user"
href="/campanha/Markola"

ENTRAR NO SORTEIO

<a

</div>

</html>
