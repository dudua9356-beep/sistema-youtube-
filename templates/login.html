<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>Painel Streamer</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f0f0f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#1c1c1c;
    padding:40px;
    border-radius:15px;
    text-align:center;
    max-width:400px;
    width:90%;
    box-shadow:0 0 20px rgba(0,0,0,.5);
}

h1{
    margin-bottom:10px;
}

p{
    color:#bbb;
}

a{
    display:block;
    margin-top:25px;
    background:#ff0000;
    color:white;
    padding:14px;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
    transition:0.3s;
}

a:hover{
    opacity:.8;
}

</style>

</head>
<body>

<div class="box">

<h1>🎥 Painel do Streamer</h1>

<p>
Acesse o painel para criar
campanhas e links protegidos.
</p>

<a href="/painel_login">
ACESSAR PAINEL
</a>

</div>

</body>
</html>
