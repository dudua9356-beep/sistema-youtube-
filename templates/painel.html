<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Administrativo</title>
<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#111;
    color:white;
}
.container{
    max-width:1000px;
    margin:30px auto;
    padding:20px;
}
.card{
    background:#1e1e1e;
    padding:25px;
    border-radius:12px;
    margin-bottom:30px;
}
input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:6px;
}
button{
    background:#00c853;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}
a{
    color:#4fc3f7;
    text-decoration:none;
}
.campanha{
    border-bottom:1px solid #333;
    padding:10px 0;
}
</style>
</head>
<body>
<div class="container">

    <h1>📊 Painel Administrativo</h1>
    <p>Bem-vindo, {{ usuario.name }} ({{ usuario.email }})</p>
    <p><a href="/logout">Sair</a></p>

    <div class="card">
        <h2>➕ Criar Nova Campanha</h2>

        <form method="POST" action="/criar">
            <input type="text" name="slug"
                   placeholder="Slug (ex: money-bum)" required>

            <input type="text" name="name"
                   placeholder="Nome da campanha" required>

            <input type="text" name="youtube_url"
                   placeholder="Link do vídeo do YouTube" required>

            <input type="text" name="giveaway_url"
                   placeholder="Link do sorteio" required>

            <button type="submit">Criar Campanha</button>
        </form>
    </div>

    <div class="card">
        <h2>📁 Campanhas Criadas</h2>

        {% for slug, campanha in campanhas.items() %}
        <div class="campanha">
            <strong>{{ campanha.name }}</strong><br>
            <a href="/campanha/{{ slug }}" target="_blank">
                /campanha/{{ slug }}
            </a>
        </div>
        {% endfor %}
    </div>

</div>
</body>
</html>
